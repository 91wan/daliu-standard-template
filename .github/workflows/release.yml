name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:

  # ── Job 1：push main → 自动修改文件（健壮版，零脏 Commit）────────────
  auto-doc:
    name: 📄 Auto-Doc
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # [插槽] 在此处插入你的任何文件自动修改逻辑，例如：
      # - name: Update README date
      #   run: sed -i "s/date-[0-9-]*/date-$(date +%Y-%m-%d)/" README.md

      - name: Commit changes if any
        run: |
          if ! git diff --quiet; then
            git config --global user.name  "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add -u
            git commit -m "docs: auto-update files [skip ci]"
            git push
          else
            echo "✅ 无需更新：工作区干净。"
          fi

  # ── Job 2：push v* tag → 从 CHANGELOG 提取说明 + GitHub Release ──────
  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Release Notes from CHANGELOG
        id: extract_notes
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}

          # 核心萃取：awk 截取两个 "## 版本号" 之间的内容
          if [ -f CHANGELOG.md ]; then
            awk "/^## ${TAG_NAME}/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md > release_notes.txt
          fi

          # 兜底：CHANGELOG 没有对应条目时，回退到最近 git log
          if [ ! -s release_notes.txt ]; then
            echo "⚠️ 未在 CHANGELOG.md 找到 ${TAG_NAME} 对应记录，回退到 git log。"
            PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV" ]; then
              git log "$PREV"..HEAD --pretty=format:"- %s" --no-merges > release_notes.txt
            else
              git log --pretty=format:"- %s" --no-merges | head -20 > release_notes.txt
            fi
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
