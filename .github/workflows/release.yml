name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:

  auto-doc:
    name: 📄 Auto-Doc
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 更新 README 日期
        id: patch
        run: |
          TODAY=$(date +%Y-%m-%d)
          CURRENT=$(grep -o 'date-[0-9-]*' README.md | head -1 | sed 's/date-//')
          if [ "$CURRENT" != "$TODAY" ]; then
            sed -i "s/date-[0-9-]*/date-${TODAY}/" README.md
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit & Push
        if: steps.patch.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: auto-update date [skip ci]"
          git push

  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 版本号
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Changelog（上一个 tag 到本 tag）
        id: log
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            LOG=$(git log "$PREV"..HEAD --pretty=format:"- %s" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi
          echo "LOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG"     >> $GITHUB_OUTPUT
          echo "EOF"      >> $GITHUB_OUTPUT

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.ver.outputs.VERSION }}"
          body: |
            ## 更新内容
            ${{ steps.log.outputs.LOG }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
